<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Key Press Magic</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, Helvetica, sans-serif;
        }

        body {
            background-color: #121212;
            color: #ffffff;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        nav {
            padding: 15px 30px;
            background-color: #1e1e1e;
            box-shadow: 0 2px 5px rgba(0,0,0,0.5);
        }

        nav a {
            text-decoration: none;
            color: #00bcd4;
            font-weight: bold;
            font-size: 18px;
        }

        nav a:hover {
            color: #ffffff;
        }

        .project {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #insert {
            background-color: #1e1e1e;
            padding: 40px 60px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.6);
            transition: 0.3s ease;
            text-align: center;
        }

        .key {
            font-size: 22px;
            letter-spacing: 1px;
        }

        table {
            border-collapse: collapse;
            margin-top: 20px;
            animation: fadeIn 0.3s ease-in-out;
        }

        th, td {
            border: 1px solid #e7e7e7;
            padding: 12px 25px;
            text-align: center;
        }

        th {
            background-color: #00bcd4;
            color: #000;
        }

        tr:nth-child(2) {
            background-color: #2a2a2a;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: scale(0.9);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }
    </style>
</head>

<body>

    <nav>
        <a href="/" aria-current="page">Home</a>
    </nav>

    <div class="project">
        <div id="insert">
            <div class="key">
                Press any key and watch magic ✨
            </div>
        </div>
    </div>

<script>

    const insert = document.getElementById('insert');

    window.addEventListener('keydown', (e) => {

        insert.innerHTML = `
            <table>
                <tr>
                    <th>Key</th>
                    <th>Code</th>
                    <th>Event Code</th>
                </tr>
                <tr>
                    <td>${e.key === " " ? "Space" : e.key}</td>
                    <td>${e.keyCode}</td>
                    <td>${e.code}</td>
                </tr>
            </table>
        `;
    });

</script>

</body>
</html>
