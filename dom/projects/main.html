<!DOCTYPE html>
<html lang="en">
<head>

<style>
    /* Reset */
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: "Poppins", sans-serif;
}

/* Body */
body {
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  background-color: #212121;
  color: #ffffff;
}

/* Navbar */
nav {
  background-color: #1a1a1a;
  padding: 20px 40px;
  display: flex;
  gap: 25px;
  border-bottom: 1px solid #333;
}

nav a {
  text-decoration: none;
  color: #bbbbbb;
  font-size: 16px;
  transition: 0.3s ease;
}

nav a:hover {
  color: #ffffff;
}

/* Main Section */
main {
  flex: 1;
  padding: 60px 20px;
  text-align: center;
}

main h1 {
  font-size: 42px;
  margin-bottom: 50px;
  letter-spacing: 1px;
}

/* Projects Container */
.projects {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 20px;
}

/* Project Links */
.project-link {
  width: 100%;
  max-width: 500px;
  padding: 18px 25px;
  text-decoration: none;
  background-color: #a39292;
  color: #2c2c2c;
  border-radius: 10px;
  font-size: 18px;
  transition: 0.3s ease;
  border: 1px solid transparent;
}

.project-link:hover {
  background-color: #333333;
  transform: translateY(-4px);
  color: white;
  border-color: #00bcd4;
  box-shadow: 0 8px 20px rgba(0, 188, 212, 0.2);
}

</style>

<body style="background-color: #212121; color: #fff">

</html>
