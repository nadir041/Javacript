<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Guess the Number</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #141e30, #243b55);
            color: #fff;
        }

        nav {
            position: absolute;
            top: 20px;
            left: 20px;
        }

        .home-btn {
            background: #fff;
            padding: 8px 20px;
            border-radius: 8px;
            color: #212121;
            text-decoration: none;
            font-weight: bold;
            transition: 0.3s;
        }

        .home-btn:hover {
            background: #00c6ff;
            color: white;
        }

        #wrapper {
            background: rgba(255, 255, 255, 0.08);
            padding: 40px;
            border-radius: 20px;
            width: 90%;
            max-width: 400px;
            backdrop-filter: blur(12px);
            box-shadow: 0 0 40px rgba(0, 0, 0, 0.4);
            text-align: center;
        }

        h1 {
            margin-bottom: 15px;
        }

        p {
            font-size: 14px;
            margin-bottom: 8px;
        }

        .guessField {
            width: 100%;
            padding: 12px;
            border-radius: 10px;
            border: none;
            margin: 15px 0;
            text-align: center;
            font-size: 16px;
        }

        .guessSubmit {
            width: 100%;
            padding: 12px;
            border-radius: 10px;
            border: none;
            background: linear-gradient(90deg, #00c6ff, #0072ff);
            color: white;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        .guessSubmit:hover {
            transform: scale(1.05);
        }

        .resultParas {
            margin-top: 20px;
        }

        .lowOrHi {
            margin-top: 10px;
            font-weight: bold;
        }

        .button {
            margin-top: 20px;
            cursor: pointer;
            color: #00ffcc;
            font-weight: bold;
        }
    </style>
</head>

<body>

<nav>
    <a class="home-btn" href="../projects/main.html">Back to Home</a>
</nav>

<div id="wrapper">
    <h1>Number Guessing Game</h1>
    <p>Guess a random number between 1 and 100</p>
    <p>You have 10 attempts</p>

    <form class="form">
        <label for="guessField">Enter your guess</label>
        <input type="number" id="guessField" class="guessField">
        <input type="submit" value="Submit Guess" class="guessSubmit">
    </form>

    <div class="resultParas">
        <p>Previous Guesses: <span class="guesses"></span></p>
        <p>Guesses Remaining: <span class="lastResult">10</span></p>
        <p class="lowOrHi"></p>
    </div>
</div>

<script>
    let randomNumber = parseInt(Math.random() * 100 + 1);

    const form = document.querySelector('.form');
    const userInput = document.querySelector('#guessField');
    const guessSlot = document.querySelector('.guesses');
    const remaining = document.querySelector('.lastResult');
    const lowOrHi = document.querySelector('.lowOrHi');
    const resultParas = document.querySelector('.resultParas');

    let prevGuess = [];
    let numGuess = 1;
    let playGame = true;

    const p = document.createElement('p');

    if (playGame) {
        form.addEventListener('submit', function (e) {
            e.preventDefault();
            const guess = parseInt(userInput.value);
            validateGuess(guess);
        });
    }

    function validateGuess(guess) {
        if (isNaN(guess)) {
            alert('Please enter a valid number');
        } else if (guess < 1) {
            alert('Please enter a number greater than 0');
        } else if (guess > 100) {
            alert('Please enter a number less than 101');
        } else {
            prevGuess.push(guess);

            if (numGuess > 10) {
                displayGuess(guess);
                displayMessage(`Game Over! Number was ${randomNumber}`);
                endGame();
            } else {
                displayGuess(guess);
                checkGuess(guess);
            }
        }
    }

    function checkGuess(guess) {
        if (guess === randomNumber) {
            displayMessage('🎉 You guessed it right!');
            endGame();
        } else if (guess < randomNumber) {
            displayMessage('Too low!');
        } else {
            displayMessage('Too high!');
        }
    }

    function displayGuess(guess) {
        userInput.value = '';
        guessSlot.innerHTML += `${guess}, `;
        numGuess++;
        remaining.innerHTML = `${10 - numGuess + 1}`;
    }

    function displayMessage(message) {
        lowOrHi.innerHTML = `<h3>${message}</h3>`;
    }

    function endGame() {
        userInput.value = '';
        userInput.setAttribute('disabled', '');
        p.classList.add('button');
        p.innerHTML = 'Start New Game';
        resultParas.appendChild(p);
        playGame = false;
        newGame();
    }

    function newGame() {
        p.addEventListener('click', function () {
            randomNumber = parseInt(Math.random() * 100 + 1);
            prevGuess = [];
            numGuess = 1;
            guessSlot.innerHTML = '';
            remaining.innerHTML = '10';
            userInput.removeAttribute('disabled');
            lowOrHi.innerHTML = '';
            resultParas.removeChild(p);
            playGame = true;
        });
    }
</script>

</body>
</html>
