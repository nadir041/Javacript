<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Color Scheme Switcher</title>

<style>
    * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: Arial, sans-serif;
    }

    body {
    background-color: #502424;
    color: #ffffff;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    transition: background-color 0.4s ease;
    }

    .canvas {
    text-align: center;
    }

    .home-btn {
    display: inline-block;
    background-color: #ffffff;
    padding: 10px 30px;
    border-radius: 8px;
    color: #212121;
    text-decoration: none;
    border: 2px solid #212121;
    margin-bottom: 30px;
    font-weight: bold;
    }

    h1 {
margin-bottom: 30px;
    }

    .button {
width: 100px;
height: 100px;
display: inline-block;
margin: 10px;
border-radius: 10px;
cursor: pointer;
border: 3px solid #000;
transition: transform 0.2s ease;
    }

    .button:hover {
transform: scale(1.1);
    }

    #grey {
    background-color: grey;
    }

    #white {
    background-color: white;
    }

    #blue {
    background-color: blue;
    }

    #yellow {
    background-color: yellow;
    }

    h2 {
    margin-top: 30px;
    font-weight: normal;
    }

    h2 span {
display: block;
font-size: 14px;
margin-top: 8px;
color: #cccccc;
    }</style>
</head>

<body>

<div class="canvas">
    <a class="home-btn" href="../projects/main.html">
        Back to Home Page
    </a>


    <h1 class="text">Color Scheme Switcher</h1>

    <span class="button" id="grey"></span>
    <span class="button" id="white"></span>
    <span class="button" id="blue"></span>
    <span class="button" id="yellow"></span>

    <h2 class="text">
    Try clicking on one of the colors above
    <span class="text">to change the background color of this page!</span>
    </h2>

</div>

<script>
    const buttons = document.querySelectorAll('.button');
    const body = document.querySelector('body');
    const text = document.querySelectorAll('.text')

    buttons.forEach(function (button){
        button.addEventListener('click', function(e){
            const color = e.target.id;
            body.style.backgroundColor = color;
            let textColor = 'white';



            if ( color === "white" || color === "yellow" ) {
                textColor = 'black'
            }
            else if (color === "grey" || color === "blue") {
            textColor = 'white';
            }
            text.forEach(function (t ){
                t.style.color = textColor;
            } )

        });

    });
    
</script>

</body>
</html>
