<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BMI Calculator</title>
</head>
<style>
    * {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
    font-family: Arial, sans-serif;
}

body {
    background-color: #121212;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

.container {
    background-color: #fff;
    padding: 40px;
    border-radius: 10px;
    width: 350px;
    box-shadow: 0 8px 20px rgba(0,0,0,0.2);
    text-align: center;
}
.home-btn {
    display: inline-block;
    background-color: #ffffff;
    padding: 10px 30px;
    border-radius: 8px;
    color: #212121;
    text-decoration: none;
    border: 2px solid #212121;
    margin-bottom: 30px;
    font-weight: bold;
    }


h1 {
    margin-bottom: 20px;
    color: #333;
}

form p {
    margin-bottom: 15px;
    text-align: left;
}

label {
    display: block;
    margin-bottom: 5px;
    font-weight: bold;
}

input[type="text"] {
    width: 100%;
    padding: 8px 10px;
    border-radius: 5px;
    border: 1px solid #ccc;
}

button {
    background-color: #28a745;
    color: #fff;
    padding: 10px 20px;
    border: none;
    border-radius: 5px;
    cursor: pointer;
    font-size: 16px;
    margin-top: 10px;
}

button:hover {
    background-color: #218838;
}

#results {
    margin-top: 20px;
    font-size: 18px;
    font-weight: bold;
    color: #333;
}

#weight-guide {
    margin-top: 30px;
    text-align: left;
    color: #555;
}

#weight-guide h3 {
    margin-bottom: 10px;
}

</style>
<body>
    <div class="container">
        <a class="home-btn" href="../projects/main.html">
        Back to Home Page
    </a>
        <h1>BMI Calculator</h1>
        <form id="bmi-form">
            <p>
                <label for="height">Height in CM: </label>
                <input type="text" id="height" placeholder="e.g. 170">
            </p>
            <p>
                <label for="weight">Weight in KG: </label>
                <input type="text" id="weight" placeholder="e.g. 65">
            </p>
            <button>Calculate</button>
        </form>

        <div id="results"></div>

        <div id="weight-guide">
            <h3>BMI Weight Guide</h3>
            <p>Under Weight = Less than 18.6</p>
            <p>Normal Range = 18.6 and 24.9</p>
            <p>Overweight = Greater than 24.9</p>
        </div>
    </div>

    <script>
        const form = document.querySelector('form');
        
        form.addEventListener('submit', function (e) {
            e.preventDefault();
            const height = parseInt(document.querySelector('#height').value);
            const weight = parseInt(document.querySelector('#weight').value);
            const result = document.querySelector('#results');
            
            if (height === '' || height < 0 || isNaN(height)) {
                result.innerHTML = `please enter valid height ${height}`
            }
            else if (weight === '' || weight < 0 || isNaN(weight)) {
                result.innerHTML = `please enter valid weight ${weight}`
            }
            else {
    const bmi = parseFloat(
        (weight / ((height/100) * (height/100))).toFixed(2)
    );
    let status = '';

    if (bmi < 18.6 ) {
        status = 'Underweight';
    } 
    else if (bmi <= 24.9) {
        status = 'Normal';
    } 
    else {
        status = 'Overweight';
    }

    result.innerHTML = `Your BMI is: <span>${bmi}</span> and status is: <b>${status}</b>`;
}
        });
    </script>
</body>
</html>
