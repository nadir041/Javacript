<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body style="background-color: #121212; color: thistle;">
    <h1>Events in JavaScript</h1>
    <button id="stop">Stop</button>
</body>
<script>
    const sayHello = function(){
        console.log("Hello");
    }
    const chageText = function(){
        document.querySelector('h1').innerHTML = "Nadir Shabbir";
    }
    const changeMe = setTimeout(chageText,4000)
    
    document.querySelector('#stop').addEventListener('click', function(){
        clearTimeout(changeMe)
        console.log("stopped");
        
    })

    

</script>
</html>
